<div id="modal" _="on closeModal or listChanged remove me" 
     class="relative z-50" role="dialog" aria-modal="true">
    
    <div class="fixed inset-0 bg-gray-900 bg-opacity-75 backdrop-blur-sm transition-opacity"></div>

    <div class="fixed inset-0 z-50 w-screen overflow-y-auto">
        <div class="flex min-h-full items-center justify-center p-4 text-center sm:p-0">
            
            <div class="relative transform overflow-hidden rounded-xl bg-white text-left shadow-2xl transition-all sm:my-8 sm:w-full sm:max-w-lg lg:max-w-2xl">
                
                <button type="button" _="on click trigger closeModal" 
                        class="absolute right-4 top-4 text-gray-400 hover:text-gray-600 transition-colors">
                    <span class="sr-only">Cerrar</span>
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>

                <form hx-post="{% url 'movies:add_review' movie.tmdb_id %}" 
                      hx-target="#modal" 
                      hx-swap="outerHTML" 
                      class="bg-white px-6 pb-6 pt-8 sm:px-10 sm:pb-8">
                    
                    {% csrf_token %}
                    
                    <div class="mb-6">
                        <h2 class="text-2xl font-bold text-gray-900 mb-1">Escribir Reseña</h2>
                        <p class="text-sm text-gray-500">Cuéntanos qué te pareció <span class="font-semibold text-indigo-600">{{ movie.title }}</span></p>
                    </div>

                    <div class="space-y-4">
                        <div class="form-container text-gray-700">
                            {% for field in movie_review_form %}
                                <div class="flex flex-col mb-4">
                                    <label class="text-sm font-semibold mb-1 text-gray-700">{{ field.label }}</label>
                                    {{ field }}
                                    {% if field.errors %}
                                        <p class="text-xs text-red-600 mt-1 font-medium">{{ field.errors.0 }}</p>
                                    {% endif %}
                                </div>
                            {% endfor %}
                        </div>
                    </div>

                    <div class="mt-8 flex items-center justify-end gap-x-4 border-t pt-6">
                        <button type="button"  
                                _="on click trigger closeModal" 
                                class="text-sm font-semibold leading-6 text-gray-600 hover:text-gray-900 transition-colors">
                            Cancelar
                        </button>
                        <button type="submit" 
                                class="rounded-lg bg-indigo-600 px-6 py-2.5 text-sm font-semibold text-white shadow-md hover:bg-indigo-700 focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-all">
                            Guardar Reseña
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
