<div id="modal" _="on closeModal or listChanged remove me" 
     class="relative z-50 animate-fade-in" role="dialog" aria-modal="true">
    
    <div class="fixed inset-0 bg-gray-900/60 backdrop-blur-md transition-opacity"></div>

    <div class="fixed inset-0 z-50 w-screen overflow-y-auto">
        <div class="flex min-h-full items-center justify-center p-4">
            
            <div class="relative transform overflow-hidden rounded-2xl bg-white shadow-2xl transition-all sm:w-full sm:max-w-lg">
                
                <div class="bg-indigo-600 px-6 py-4">
                    <h2 class="text-xl font-bold text-white flex items-center gap-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.921-.755 1.688-1.54 1.118l-3.976-2.888a1 1 0 00-1.175 0l-3.976 2.888c-.784.57-1.838-.197-1.539-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>
                        Tu Reseña
                    </h2>
                </div>

                <form hx-post="{% url 'movies:add_review' movie.tmdb_id %}" 
                      hx-target="#modal" 
                      hx-swap="outerHTML" 
                      class="p-6">
                    
                    {% csrf_token %}
                    
                    <div class="space-y-5">
                        {% for field in movie_review_form %}
                        <div class="relative">
                            <label class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-1 block">
                                {{ field.label }}
                            </label>
                            
                            <div class="relative group">
                                {{ field }}
                            </div>

                            {% if field.errors %}
                                <div class="flex items-center gap-1 mt-1 text-red-500">
                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                                    <p class="text-xs font-medium">{{ field.errors.0 }}</p>
                                </div>
                            {% endif %}
                        </div>
                        {% endfor %}
                    </div>

                    <div class="mt-8 flex flex-col-reverse sm:flex-row sm:justify-end gap-3">
                        <button type="button"  
                                _="on click trigger closeModal" 
                                class="w-full sm:w-auto px-5 py-2.5 text-sm font-medium text-gray-700 bg-gray-100 rounded-xl hover:bg-gray-200 transition-all">
                            Tal vez luego
                        </button>
                        <button type="submit" 
                                class="w-full sm:w-auto px-8 py-2.5 text-sm font-bold text-white bg-indigo-600 rounded-xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:shadow-indigo-300 transform active:scale-95 transition-all">
                            Publicar ahora
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    
    .space-y-5 input, .space-y-5 textarea {
        width: 100%;
        background-color: #f9fafb;
        border: 2px solid #f3f4f6;
        border-radius: 0.75rem;
        padding: 0.75rem 1rem;
        transition: all 0.2s;
        outline: none;
    }

    .space-y-5 input:focus, .space-y-5 textarea:focus {
        background-color: #fff;
        border-color: #4f46e5;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    @keyframes fade-in {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }
    .animate-fade-in { animation: fade-in 0.2s ease-out; }
</style>
