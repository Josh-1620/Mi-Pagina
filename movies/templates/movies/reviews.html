<div class="space-y-4">

  {% for review in reviews %}
    <div class="bg-white shadow-md rounded-xl p-4 border border-gray-100">

      <!-- Header -->
      <div class="flex justify-between items-center mb-2">
        <div class="flex items-center space-x-2">
          <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-sm font-bold text-gray-600">
            {{ review.user.username|slice:":1"|upper }}
          </div>
          <span class="font-semibold text-gray-800">
            {{ review.user.username }}
          </span>
        </div>

        <span class="text-xs text-gray-400">
          {{ review.created_at|date:"d M Y" }}
        </span>
      </div>

      <!-- Contenido -->
      <p class="text-gray-600 text-sm leading-relaxed">
        {{ review.content }}
      </p>

    </div>
  {% empty %}
    <div class="text-center text-gray-400 text-sm italic">
      No hay reseñas aún. Sé el primero en escribir una ✍️
    </div>
  {% endfor %}

</div>
