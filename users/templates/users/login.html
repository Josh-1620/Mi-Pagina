{% extends "movies/base.html" %}

{% block content %}
<div class="flex min-h-full items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white border border-gray-100 shadow-2xl rounded-2xl p-10">
        <div>
            <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900">Inicia sesión</h2>
            <p class="mt-2 text-center text-sm text-gray-500">¡Qué bueno verte de nuevo!</p>
        </div>

        {% if errors %}  
        <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md" role="alert">
            <div class="flex">
                <div class="ml-3">
                    <p class="text-sm text-red-700 font-bold">Error:</p>
                    <p class="text-sm text-red-600">Usuario o contraseña incorrectos.</p>
                </div>
            </div>
        </div>
        {% endif %}

        <form id='login_form' class="mt-8 space-y-6" role="form" method="post" action='{% url "users:login" %}'>
            {% csrf_token %}
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label class="sr-only">Usuario</label>
                    <input type="text" name="username" required 
                        class="appearance-none rounded-lg relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" 
                        placeholder="Nombre de usuario">
                </div>
                <div>
                    <label class="sr-only">Contraseña</label>
                    <input type="password" name="password" required 
                        class="appearance-none rounded-lg relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" 
                        placeholder="Contraseña">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="text-sm">
                    <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500">¿Olvidaste tu contraseña?</a>
                </div>
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all transform active:scale-95">
                    Entrar a Mi Cuenta
                </button>
            </div>

            <div class="text-center text-sm text-gray-600">
                ¿Aún no tienes cuenta? 
                <a href="/accounts/register" class="font-medium text-indigo-600 hover:text-indigo-500">Regístrate ahora</a>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
